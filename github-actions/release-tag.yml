name: Production Tag-Based Release

on:
  push:
    tags:
      - 'v*--*' # Pattern: v1.0--identity-service

jobs:
  build-and-release:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Parse Tag for Service & Version
        id: extract_info
        run: |
          FULL_TAG=${{ github.ref_name }}
          VERSION=$(echo $FULL_TAG | cut -d'-' -f1)
          SERVICE=$(echo $FULL_TAG | sed 's/.*--//')
          
          echo "service=$SERVICE" >> $GITHUB_OUTPUT
          echo "version=$VERSION" >> $GITHUB_OUTPUT
          echo "Targeted Service: $SERVICE | Version: $VERSION"

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Build and Push to Docker Hub
        uses: docker/build-push-action@v5
        with:
          context: .
          # DHAYAN SE DEKH: matrix.service ki jagah niche wala use kar
          file: ./apps/${{ steps.extract_info.outputs.service }}/Dockerfile
          push: true
          tags: |
            ${{ secrets.DOCKER_USERNAME }}/${{ steps.extract_info.outputs.service }}:${{ steps.extract_info.outputs.version }}
            ${{ secrets.DOCKER_USERNAME }}/${{ steps.extract_info.outputs.service }}:latest