name: Build and Push Microservices

on:
  push:
    branches: [ "feat/auth" ]
  
jobs:
  build-and-push:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        # Yahan apni dono services ke folder names daal do
        # Yahan apni dono services ke folder names daal do
        service: [identity-service, post-service]
    
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Build and Push ${{ matrix.service }}
        uses: docker/build-push-action@v5
        with:
          # context batata hai ki Dockerfile kahan hai
          context: . 
          # Dockerfile ka sahi rasta batao
          file: ./apps/${{ matrix.service }}/Dockerfile 
          push: true
          # Image ka naam: username/service-name:latest
          tags: |
            ${{ secrets.DOCKER_USERNAME }}/${{ matrix.service }}:v5
            ${{ secrets.DOCKER_USERNAME }}/${{ matrix.service }}:${{ github.run_number }}