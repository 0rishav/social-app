name: Production Tag-Based Release

on:
  push:
    tags:
      - 'v*--*' # Pattern: v1.0--identity-service

jobs:
  build-and-release:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Parse Tag for Service & Version
        id: extract_info
        run: |
          # GITHUB_REF format: refs/tags/v1.0--identity-service
          FULL_TAG=${{ github.ref_name }}
          VERSION=$(echo $FULL_TAG | cut -d'-' -f1)
          SERVICE=$(echo $FULL_TAG | sed 's/.*--//')
          
          echo "service=$SERVICE" >> $GITHUB_OUTPUT
          echo "version=$VERSION" >> $GITHUB_OUTPUT
          echo "Targeted Service: $SERVICE | Version: $VERSION"

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      # 1. Build And Push Image Locally (No Push yet)
      - name: Push to Docker Hub
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./apps/${{ matrix.service }}/Dockerfile
          push: true
          tags: |
            ${{ secrets.DOCKER_USERNAME }}/${{ matrix.service }}:v5
            ${{ secrets.DOCKER_USERNAME }}/${{ matrix.service }}:${{ github.run_number }}