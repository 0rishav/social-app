name: Build, Verify and Push Microservices

on:
  push:
    branches: [ "feat/auth" ]

jobs:
  build-verify-push:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        service: [identity-service, post-service]
    
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      # 1. Ye step Docker ko "Superpowers" deta hai (Multi-platform support)
      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      # 2. Ye step naya Builder banata hai jo Caching support karta hai (ZAROORI HAI)
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Build and Push
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./apps/${{ matrix.service }}/Dockerfile
          push: true
          tags: ${{ secrets.DOCKER_USERNAME }}/${{ matrix.service }}:v5
          # --- GHA CACHING (Sabse Fast aur Clean) ---
          cache-from: type=gha
          cache-to: type=gha,mode=max