name: Deploy React App to S3

on:
  push:
    branches: [ "feat/auth" ]

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      # 1. Node Setup (Speed ke liye cache)
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      # 2. Dependencies & Build (Sab ek saath frontend folder ke andar)
      - name: Build React App
        working-directory: ./frontend
        run: |
          npm ci
          npm run build 

      # 3. AWS Credentials Configure karna
      - name: Configure AWS Credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: eu-north-1 

      # 4. Build folder ko S3 pe Sync karna
      - name: Deploy to S3
        run: |
          aws s3 sync ./frontend/dist s3://${{ secrets.AWS_S3_BUCKET_NAME }} --delete